name: IDBS 5.0 Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Syntax, unit, type and production build checks
        run: npm run v5:quality

  integration:
    needs: quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: idbs
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d idbs"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/idbs
      ADMIN_PASSWORD: IDBS_ci_admin_password_2026
      TOKEN_SECRET: IDBS_ci_token_secret_at_least_32_characters_2026
      CORS_ORIGIN: http://127.0.0.1:3000
      API_RATE_LIMIT_MAX: 1000
      AUTH_RATE_LIMIT_MAX: 100
RESET_IDBS_SCHEMA: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix web ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Prepare database and frontend
        run: |
          npm run db:reset-schema
          npm run db:migrate
          npm run db:seed-demo
          npm run db:upgrade-schema
          npm run doctor
          npm run v5:build

      - name: Start IDBS
        run: |
          npm start > server-ci.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3000/ready > /dev/null; then exit 0; fi
            sleep 1
          done
          cat server-ci.log
          exit 1

      - name: API and permission verification
        run: |
          npm run smoke
          npm run v5:selftest
          npm run v5:permission-audit

      - name: Browser verification
        run: |
          npm run e2e
          npm run v5:click-audit

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: idbs-5-ci-evidence
          path: |
            server-ci.log
            test-results/
            .codex/*-report.json
