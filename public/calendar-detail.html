<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>日历详情</title>
  <link rel="stylesheet" href="css/style.css?v=20260629d">
</head>
<body>
<main>
  <section class="hero">
    <h2 id="title">使用详情</h2>
    <p class="muted">查看当天具体谁在使用、使用什么设备以及对应时间段。</p>
  </section>
  <section class="card" id="detail-box"></section>
</main>

<script src="js/config.js"></script>
<script src="js/api.js?v=20260629b"></script>
<script src="js/ui.js"></script>
<script src="js/common-header.js?v=20260629c"></script>
<script>
if (!isLoggedIn() && !isAdminLoggedIn()) {
  location.href = 'login.html';
  throw new Error('Login required');
}

const date = qs('date') || new Date().toISOString().slice(0, 10);
const adminView = qs('admin') === '1';
document.getElementById('title').textContent = `${date} 使用详情`;

async function loadDetail() {
  const box = document.getElementById('detail-box');
  setLoading(box, '正在加载日历详情...');
  try {
    const result = await callRestApi(`/calendar?start=${encodeURIComponent(date)}&end=${encodeURIComponent(date)}`, { admin: adminView });
    const events = result.events || [];
    box.innerHTML = events.length ? `
      <div class="table-wrap">
        <table>
          <tr><th>设备</th><th>使用人</th><th>时间段</th><th>状态</th><th>用途</th></tr>
          ${events.map((event) => `
            <tr>
              <td><span class="calendar-dot" style="background:${escapeHtml(event.color)}"></span> ${escapeHtml(event.device_code)}<br><span class="muted">${escapeHtml(event.device_name || '-')}</span></td>
              <td>${escapeHtml(event.user_name || '-')}<br><span class="muted">${escapeHtml(event.user_phone || '-')}</span></td>
              <td>${escapeHtml(fmtTime(event.start_time))}<br>${escapeHtml(fmtTime(event.end_time))}</td>
              <td>${statusBadge(event.status)}</td>
              <td>${escapeHtml(event.purpose || '-')}</td>
            </tr>
          `).join('')}
        </table>
      </div>
      <div class="actions"><a href="calendar.html${adminView ? '?admin=1' : ''}">返回日历</a></div>
    ` : '<div class="empty-state">当天没有预约或使用记录。</div><div class="actions"><a href="calendar.html">返回日历</a></div>';
  } catch (error) {
    showPageMessage(box, 'danger', error.message);
  }
}

loadDetail();
</script>
</body>
</html>
