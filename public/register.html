<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>微信注册 / 首次绑定</title>
  <link rel="stylesheet" href="css/style.css?v=20260702a">
  <link rel="stylesheet" href="css/formal.css?v=20260702b">
</head>
<body>
<main>
  <section class="hero">
    <h2>微信注册 / 首次绑定</h2>
    <div class="hero-meta">
      <span class="badge info">不再开放普通密码注册</span>
      <span class="badge warn">绑定后需管理员审核</span>
    </div>
  </section>

  <section class="grid login-grid">
    <section class="card stack">
      <h3>注册流程</h3>
      <div class="soft-panel">
        <div class="metric-label">第一步</div>
        <p>进入登录页，点击“生成验证码”。</p>
      </div>
      <div class="soft-panel">
        <div class="metric-label">第二步</div>
        <p>把验证码发送到公众号，系统自动读取你的微信 OpenID。</p>
      </div>
      <div class="soft-panel">
        <div class="metric-label">第三步</div>
        <p>页面弹出首次绑定表单后，填写姓名、学号、联系方式，提交后等待管理员审核。</p>
      </div>
      <div class="actions">
        <a href="login.html" class="button-link">前往微信验证码注册/绑定</a>
      </div>
    </section>
  </section>
</main>

<script src="js/config.js"></script>
<script src="js/api.js?v=20260702a"></script>
<script src="js/ui.js?v=20260701e"></script>
<script src="js/common-header.js?v=20260703b"></script>
<script src="js/page-shortcuts.js?v=20260701e"></script>
</body>
</html>
