<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>发起预约</title>
  <link rel="stylesheet" href="css/style.css?v=20260702a">
  <link rel="stylesheet" href="css/formal.css?v=20260702b">
</head>
<body>
<main>
  <section class="hero reserve-hero">
    <div>
      <h2>发起设备预约</h2>
    </div>
    <div class="hero-actions">
      <a class="badge info" href="calendar.html">查看使用日历</a>
      <a class="badge" href="my.html">我的预约</a>
    </div>
  </section>

  <section class="card reserve-panel">
    <div id="message"></div>
    <div class="reserve-steps">
      <div class="reserve-step soft-panel">
        <div class="step-kicker">选设备</div>
        <label for="device_search">搜索并选择设备</label>
        <div class="combo-box">
          <input id="device_search" class="mono" autocomplete="off" placeholder="输入设备编号、名称或位置，点击下方结果即可加入">
          <div id="device_suggestions" class="suggestion-list hidden"></div>
        </div>
        <input id="device_codes" type="hidden">
        <div id="selected_devices" class="chip-list"></div>
      </div>

      <div class="reserve-step soft-panel">
        <div class="step-kicker">选时间</div>
        <div class="section-head compact-head">
          <div>
            <label for="reservation_date">预约日期</label>
          </div>
        </div>
        <div class="reserve-date-row">
          <input id="reservation_date" type="date">
          <button id="add-date-btn" class="secondary">添加日期</button>
          <button id="clear-dates-btn" class="secondary">清空日期</button>
        </div>
        <div class="quick-date-actions actions">
          <button type="button" class="secondary" data-quick-date="tomorrow">明天</button>
          <button type="button" class="secondary" data-quick-date="afterTomorrow">后天</button>
          <button type="button" class="secondary" data-quick-date="workweek">未来 5 个工作日</button>
        </div>
        <div id="selected_dates" class="chip-list"></div>

        <div class="section-head compact-head">
          <div>
            <h3>选择预约时间段</h3>
          </div>
          <div class="actions">
            <button id="select-all-slots-btn" class="secondary">选择全天四段</button>
            <button id="clear-slots-btn" class="secondary">清空时间段</button>
          </div>
        </div>
        <div id="slot_options" class="slot-grid"></div>
        <div id="slot_preview"></div>
      </div>

      <div class="reserve-step soft-panel">
        <div class="step-kicker">提交</div>
        <div class="section-head compact-head">
          <div>
            <h3>确认并提交</h3>
          </div>
        </div>
        <details class="advanced-reserve">
          <summary>批量预约 / 多组预约</summary>
          <div class="actions">
            <button id="add-plan-btn" type="button" class="secondary">加入计划组后继续选择</button>
            <button id="clear-plans-btn" type="button" class="secondary">清空计划组</button>
          </div>
          <div id="plan_groups" class="stack"></div>
        </details>
        <label for="purpose">使用目的</label>
        <textarea id="purpose" rows="4" placeholder="请说明用途，方便管理员审核"></textarea>
        <div class="actions reserve-submit-actions">
          <button id="submit-btn" class="success">确认并提交预约</button>
          <a href="index.html">返回设备列表</a>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="js/config.js"></script>
<script src="js/api.js?v=20260702a"></script>
<script src="js/ui.js?v=20260701e"></script>
<script src="js/reservation-slots.js?v=20260703b"></script>
<script src="js/common-header.js?v=20260703b"></script>
<script src="js/page-shortcuts.js?v=20260701e"></script>
<script>
if (!requireLogin()) throw new Error('User login required');

const deviceSearchInput = document.getElementById('device_search');
const deviceSuggestionsEl = document.getElementById('device_suggestions');
const selectedDevicesEl = document.getElementById('selected_devices');
const deviceCodesInput = document.getElementById('device_codes');
const reservationDateInput = document.getElementById('reservation_date');
const selectedDatesEl = document.getElementById('selected_dates');
const slotOptionsEl = document.getElementById('slot_options');
const slotPreviewEl = document.getElementById('slot_preview');
const planGroupsEl = document.getElementById('plan_groups');

let allDevices = [];
let selectedDeviceCodes = new Set();
let selectedDates = new Set();
let reservationGroups = [];
let slotPresets = ReservationSlots.fallbackPresets;
let submittingReservation = false;

function dateText(date) {
  const copy = new Date(date);
  copy.setMinutes(copy.getMinutes() - copy.getTimezoneOffset());
  return copy.toISOString().slice(0, 10);
}

function setupDefaultDate() {
  const tomorrow = new Date(Date.now() + 24 * 60 * 60 * 1000);
  reservationDateInput.min = dateText(tomorrow);
  reservationDateInput.value = dateText(tomorrow);
  selectedDates.add(dateText(tomorrow));
  renderSelectedDates();
}

function addDateIfAllowed(value) {
  if (!value) return false;
  if (value < reservationDateInput.min) {
    showPageMessage('message', 'warn', '预约日期必须是明天或更晚日期。');
    return false;
  }
  selectedDates.add(value);
  renderSelectedDates();
  updateSlotPreview();
  return true;
}

function addQuickDates(type) {
  const base = new Date();
  const addOffsetDate = (offset) => {
    const date = new Date(base);
    date.setDate(base.getDate() + offset);
    selectedDates.add(dateText(date));
  };
  if (type === 'tomorrow') addOffsetDate(1);
  if (type === 'afterTomorrow') addOffsetDate(2);
  if (type === 'workweek') {
    let offset = 1;
    let added = 0;
    while (added < 5 && offset < 14) {
      const date = new Date(base);
      date.setDate(base.getDate() + offset);
      const day = date.getDay();
      if (day !== 0 && day !== 6) {
        selectedDates.add(dateText(date));
        added += 1;
      }
      offset += 1;
    }
  }
  renderSelectedDates();
  updateSlotPreview();
}

function isReservableDevice(device) {
  return device.allow_reservation !== false && !['maintenance', 'disabled', 'abnormal_pending'].includes(device.status);
}

function deviceLabel(device) {
  return `${device.device_code} · ${device.name || '-'} · ${device.location || '未填写位置'}`;
}

function findDevice(code) {
  return allDevices.find((device) => device.device_code === code);
}

function renderSelectedDevices() {
  const codes = [...selectedDeviceCodes];
  deviceCodesInput.value = codes.join(',');
  selectedDevicesEl.innerHTML = codes.length ? codes.map((code) => {
    const device = findDevice(code);
    return `
      <span class="chip">
        ${escapeHtml(device ? deviceLabel(device) : code)}
        <button class="chip-remove" data-code="${escapeHtml(code)}" aria-label="移除设备">×</button>
      </span>
    `;
  }).join('') : '<p class="muted">尚未选择设备。</p>';

  selectedDevicesEl.querySelectorAll('.chip-remove').forEach((button) => {
    button.addEventListener('click', () => {
      selectedDeviceCodes.delete(button.dataset.code);
      renderSelectedDevices();
      refreshSlotOptions();
    });
  });
}

function renderSelectedDates() {
  const dates = [...selectedDates].sort();
  selectedDatesEl.innerHTML = dates.length ? dates.map((date) => `
    <span class="chip">${escapeHtml(date)}<button class="chip-remove" data-date="${escapeHtml(date)}" aria-label="移除日期">×</button></span>
  `).join('') : '<p class="muted">尚未选择日期。</p>';
  selectedDatesEl.querySelectorAll('.chip-remove').forEach((button) => {
    button.addEventListener('click', () => {
      selectedDates.delete(button.dataset.date);
      renderSelectedDates();
      updateSlotPreview();
    });
  });
}

function renderDeviceSuggestions() {
  const keyword = deviceSearchInput.value.trim().toLowerCase();
  const candidates = allDevices
    .filter(isReservableDevice)
    .filter((device) => !selectedDeviceCodes.has(device.device_code))
    .filter((device) => !keyword || [device.device_code, device.name, device.location, device.category].some((value) => String(value || '').toLowerCase().includes(keyword)))
    .slice(0, 8);

  if (!candidates.length) {
    deviceSuggestionsEl.innerHTML = '<div class="suggestion-empty">没有匹配的可预约设备</div>';
    deviceSuggestionsEl.classList.remove('hidden');
    return;
  }

  deviceSuggestionsEl.innerHTML = candidates.map((device) => `
    <button class="suggestion-item" data-code="${escapeHtml(device.device_code)}">
      <strong>${escapeHtml(device.device_code)}</strong>
      <span>${escapeHtml(device.name || '-')} · ${escapeHtml(device.location || '未填写位置')}</span>
    </button>
  `).join('');
  deviceSuggestionsEl.classList.remove('hidden');
  deviceSuggestionsEl.querySelectorAll('.suggestion-item').forEach((button) => {
    button.addEventListener('click', () => {
      selectedDeviceCodes.add(button.dataset.code);
      deviceSearchInput.value = '';
      deviceSuggestionsEl.classList.add('hidden');
      renderSelectedDevices();
      refreshSlotOptions();
    });
  });
}

function selectedSlotKeys() {
  return ReservationSlots.selectedKeys(slotOptionsEl);
}

function bindSlotEvents() {
  slotOptionsEl.querySelectorAll('input[type="checkbox"]').forEach((input) => {
    input.addEventListener('change', updateSlotPreview);
  });
}

function updateSlotPreview() {
  const dates = [...selectedDates].sort();
  if (!dates.length) {
    slotPreviewEl.innerHTML = '<p class="muted">请先添加预约日期。</p>';
    return { valid: false, ranges: [] };
  }
  const results = dates.map((date) => ReservationSlots.renderPreview(document.createElement('div'), date, selectedSlotKeys(), slotPresets));
  const invalid = results.find((item) => !item.valid);
  slotPreviewEl.innerHTML = dates.map((date, index) => `
    <div class="soft-panel">
      <div class="metric-label">${escapeHtml(date)}</div>
      ${results[index].valid
        ? `<div class="slot-preview">${results[index].ranges.map((range) => `<span class="slot-time-badge slot-${escapeHtml(range.key)}">${escapeHtml(range.label)}：${escapeHtml(range.start)} - ${escapeHtml(range.end)}</span>`).join('')}</div>`
        : '<div class="alert warn">请选择互不重叠的预约时间段。</div>'}
    </div>
  `).join('');
  return invalid || { valid: true, ranges: results.flatMap((item) => item.ranges || []) };
}

async function refreshSlotOptions() {
  if (!selectedDeviceCodes.size) {
    slotOptionsEl.innerHTML = '<div class="empty-state">请先选择设备，再选择预约时间段。</div>';
    slotPreviewEl.innerHTML = '';
    return;
  }

  const previousKeys = selectedSlotKeys();
  const result = await callRestApi(`/reservation-slots?device_codes=${encodeURIComponent([...selectedDeviceCodes].join(','))}`);
  slotPresets = result.presets || ReservationSlots.fallbackPresets;
  const allowedKeys = slotPresets.map((slot) => slot.key);
  const nextKeys = previousKeys.length
    ? previousKeys.filter((key) => allowedKeys.includes(key))
    : allowedKeys.slice(0, 1);
  ReservationSlots.renderCheckboxes(slotOptionsEl, slotPresets, nextKeys, { name: 'reserve_slot_keys' });
  bindSlotEvents();
  updateSlotPreview();
}

async function loadDeviceOptions() {
  const result = await callRestApi('/devices');
  allDevices = result.list || result.devices || [];
  const initialCodes = (qs('device_codes') || qs('device_code') || '').split(',').map((item) => item.trim()).filter(Boolean);
  initialCodes.forEach((code) => selectedDeviceCodes.add(code));
  renderSelectedDevices();
  await refreshSlotOptions();
}

function currentGroupPayload() {
  return {
    device_codes: [...selectedDeviceCodes],
    reservation_dates: [...selectedDates].sort(),
    slot_keys: selectedSlotKeys()
  };
}

function renderPlanGroups() {
  planGroupsEl.innerHTML = reservationGroups.length ? `
    <section class="soft-panel">
      <h3>待提交预约计划</h3>
      ${reservationGroups.map((group, index) => `
        <div class="plan-row">
          <div>
            <strong>计划 ${index + 1}</strong>
            <p class="muted">设备：${escapeHtml(group.device_codes.join(', '))}</p>
            <p class="muted">日期：${escapeHtml(group.reservation_dates.join(', '))}</p>
            <p class="muted">时间段：${escapeHtml(group.slot_keys.map((key) => slotPresets.find((slot) => slot.key === key)?.label || key).join('、'))}</p>
          </div>
          <button class="danger" data-plan-index="${index}">移除</button>
        </div>
      `).join('')}
    </section>
  ` : '';
  planGroupsEl.querySelectorAll('[data-plan-index]').forEach((button) => {
    button.addEventListener('click', () => {
      reservationGroups.splice(Number(button.dataset.planIndex), 1);
      renderPlanGroups();
    });
  });
}

function addCurrentPlan() {
  const messageEl = document.getElementById('message');
  const group = currentGroupPayload();
  const preview = updateSlotPreview();
  messageEl.innerHTML = '';
  if (!group.device_codes.length) return showPageMessage(messageEl, 'warn', '请先选择至少一台设备。');
  if (!group.reservation_dates.length) return showPageMessage(messageEl, 'warn', '请至少添加一个预约日期。');
  if (!group.slot_keys.length) return showPageMessage(messageEl, 'warn', '请至少选择一个预约时间段。');
  if (!preview.valid) return showPageMessage(messageEl, 'warn', '请选择互不重叠的预约时间段。');
  reservationGroups.push(group);
  renderPlanGroups();
  showPageMessage(messageEl, 'success', '已加入一组预约计划，可继续选择其他设备和日期。');
}

function renderPrecheckConflicts(conflicts = []) {
  if (!conflicts.length) return '';
  return `
    <div class="alert warn">
      <strong>提交前发现 ${conflicts.length} 个问题：</strong>
      <ul class="conflict-list">
        ${conflicts.map((item) => `
          <li>
            ${escapeHtml(item.reason || '该预约计划暂不可提交。')}
            ${item.start_time ? `<br><span class="muted">${escapeHtml(fmtTime(item.start_time))} - ${escapeHtml(fmtTime(item.end_time))}</span>` : ''}
            ${item.conflict_start_time ? `<br><span class="muted">冲突记录：${escapeHtml(fmtTime(item.conflict_start_time))} - ${escapeHtml(fmtTime(item.conflict_end_time))} · ${escapeHtml(statusText(item.conflict_status))}</span>` : ''}
          </li>
        `).join('')}
      </ul>
    </div>
  `;
}

async function precheckReservation(payload) {
  const result = await callRestApi('/reservation-batches/precheck', { method: 'POST', body: payload });
  if (!result.available) {
    const conflicts = result.conflicts || [];
    const messageEl = document.getElementById('message');
    messageEl.innerHTML = renderPrecheckConflicts(conflicts);
    return false;
  }
  return true;
}

async function submitReserve() {
  if (!requireLogin()) return;
  if (submittingReservation) return;
  const messageEl = document.getElementById('message');
  messageEl.innerHTML = '';

  const deviceCodes = [...selectedDeviceCodes];
  const slotKeys = selectedSlotKeys();
  const preview = updateSlotPreview();
  const groups = reservationGroups.length ? reservationGroups : [currentGroupPayload()];
  if (!reservationGroups.length) {
    if (!deviceCodes.length) return showPageMessage(messageEl, 'warn', '请先选择至少一台设备。');
    if (!selectedDates.size) return showPageMessage(messageEl, 'warn', '请至少添加一个预约日期。');
    if (!slotKeys.length) return showPageMessage(messageEl, 'warn', '请至少选择一个预约时间段。');
    if (!preview.valid) return showPageMessage(messageEl, 'warn', '请选择互不重叠的预约时间段。');
  }

  const firstGroup = groups[0] || {};
  if (!groups.every((group) => group.device_codes?.length && group.reservation_dates?.length && group.slot_keys?.length)) {
    return showPageMessage(messageEl, 'warn', '预约计划不完整，请检查设备、日期和时间段。');
  }

  try {
    submittingReservation = true;
    const submitButton = document.getElementById('submit-btn');
    if (typeof setButtonBusy === 'function') setButtonBusy(submitButton, true, '检查中...');
    else {
      submitButton.disabled = true;
      submitButton.textContent = '检查中...';
    }
    const payload = {
      device_codes: firstGroup.device_codes || [],
      reservation_dates: firstGroup.reservation_dates || [],
      slot_keys: firstGroup.slot_keys || [],
      reservation_groups: groups,
      purpose: purpose.value.trim()
    };
    const precheckOk = await precheckReservation(payload);
    if (!precheckOk) return;
    if (typeof setButtonBusy === 'function') setButtonBusy(submitButton, true, '提交中...');
    else submitButton.textContent = '提交中...';
    const result = await callRestApi('/reservation-batches', { method: 'POST', body: payload });
    showPageMessage(messageEl, 'success', result.message || '预约已提交。');
    setTimeout(() => { location.replace('my.html'); }, 700);
  } catch (error) {
    showPageMessage(messageEl, 'danger', error.message);
  } finally {
    submittingReservation = false;
    const submitButton = document.getElementById('submit-btn');
    if (typeof setButtonBusy === 'function') setButtonBusy(submitButton, false);
    else {
      submitButton.disabled = false;
      submitButton.textContent = '提交预约';
    }
  }
}

setupDefaultDate();
deviceSearchInput.addEventListener('input', renderDeviceSuggestions);
deviceSearchInput.addEventListener('focus', renderDeviceSuggestions);
document.addEventListener('click', (event) => {
  if (!event.target.closest('.combo-box')) deviceSuggestionsEl.classList.add('hidden');
});
reservationDateInput.addEventListener('change', updateSlotPreview);
document.getElementById('add-date-btn').addEventListener('click', () => {
  addDateIfAllowed(reservationDateInput.value);
});
document.querySelectorAll('[data-quick-date]').forEach((button) => {
  button.addEventListener('click', () => addQuickDates(button.dataset.quickDate));
});
document.getElementById('clear-dates-btn').addEventListener('click', () => {
  selectedDates.clear();
  renderSelectedDates();
  updateSlotPreview();
});
document.getElementById('select-all-slots-btn').addEventListener('click', () => {
  ReservationSlots.renderCheckboxes(slotOptionsEl, slotPresets, ReservationSlots.baseKeys(slotPresets), { name: 'reserve_slot_keys' });
  bindSlotEvents();
  updateSlotPreview();
});
document.getElementById('clear-slots-btn').addEventListener('click', () => {
  ReservationSlots.renderCheckboxes(slotOptionsEl, slotPresets, [], { name: 'reserve_slot_keys' });
  bindSlotEvents();
  updateSlotPreview();
});
document.getElementById('add-plan-btn').addEventListener('click', addCurrentPlan);
document.getElementById('clear-plans-btn').addEventListener('click', () => {
  reservationGroups = [];
  renderPlanGroups();
});
document.getElementById('submit-btn').addEventListener('click', submitReserve);
loadDeviceOptions().catch((error) => showPageMessage('message', 'danger', error.message));
</script>
</body>
</html>
