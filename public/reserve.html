<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>发起预约</title>
  <link rel="stylesheet" href="css/style.css?v=20260629a">
</head>
<body>
<main>
  <section class="hero">
    <h2>发起设备预约</h2>
    <p class="muted">系统会自动校验时间冲突，待审核预约也会占用时间段。</p>
  </section>

  <section class="card">
    <div id="message"></div>
    <label for="device_codes">设备编号（支持多个，逗号分隔）</label>
    <input id="device_codes" class="mono" placeholder="例如：EQ-001, EQ-002">
    <div class="form-grid">
      <div>
        <label for="time_slots">时间段（支持多个，按行填写）</label>
        <textarea id="time_slots" rows="5" placeholder="2026-06-26 08:00 - 10:00\n2026-06-26 14:00 - 16:00"></textarea>
      </div>
    </div>
    <label for="purpose">使用目的</label>
    <textarea id="purpose" rows="4" placeholder="请说明用途，方便管理员审核"></textarea>
    <div class="actions">
      <button id="submit-btn">提交预约</button>
      <a href="index.html">返回设备列表</a>
    </div>
  </section>
</main>

<script src="js/config.js"></script>
<script src="js/api.js?v=20260629b"></script>
<script src="js/ui.js"></script>
<script src="js/common-header.js?v=20260629a"></script>
<script>
if (!requireLogin()) throw new Error('User login required');

device_codes.value = qs('device_code') || qs('device_codes') || '';

async function submitReserve() {
  if (!requireLogin()) return;
  const messageEl = document.getElementById('message');
  messageEl.innerHTML = '';

  const deviceCodes = device_codes.value.split(',').map((item) => item.trim()).filter(Boolean);
  const timeSlots = time_slots.value.split(/\r?\n/).map((item) => item.trim()).filter(Boolean);

  try {
    const result = await callApi('createReservation', {
      device_codes: deviceCodes,
      time_slots: timeSlots,
      purpose: purpose.value.trim()
    });
    showPageMessage(messageEl, 'success', result.message || '预约已提交。');
    setTimeout(() => { location.href = 'my.html'; }, 700);
  } catch (error) {
    showPageMessage(messageEl, 'danger', error.message);
  }
}

document.getElementById('submit-btn').addEventListener('click', submitReserve);
</script>
</body>
</html>
