<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>用户登录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main>
  <section class="hero">
    <h2>欢迎回来</h2>
    <p class="muted">支持账号密码登录，也支持公众号验证码登录。首次通过微信进入时，系统会自动引导你绑定姓名和学号。</p>
    <div class="hero-meta">
      <span class="badge info">自动识别管理员/用户</span>
      <span class="badge warn">支持微信绑定与安全风控</span>
    </div>
  </section>

  <section class="grid login-grid">
    <section class="card">
      <h3>账号密码登录</h3>
      <div id="message"></div>
      <label for="phone">手机号</label>
      <input id="phone" inputmode="tel" placeholder="请输入手机号">
      <label for="password">密码</label>
      <input id="password" type="password" placeholder="请输入密码">
      <p class="field-help">管理员账号登录后会自动显示后台入口与管理面板。</p>
      <div class="actions">
        <button id="login-btn">登录</button>
        <a href="register.html">还没有账号？去注册</a>
      </div>
    </section>

    <section class="card">
      <h3>公众号验证码登录</h3>
      <div id="wechat-message"></div>
      <div class="soft-panel">
        <div class="metric-label">第一步</div>
        <p>点击生成验证码，然后把验证码发送到你的公众号。</p>
        <div class="code-board">
          <div>
            <div class="metric-label">当前验证码</div>
            <div id="challenge-code" class="challenge-code">-----</div>
          </div>
          <div>
            <div class="metric-label">有效期</div>
            <div id="challenge-expire" class="challenge-expire">-</div>
          </div>
        </div>
        <div class="actions">
          <button id="new-challenge-btn">生成验证码</button>
          <button id="check-status-btn" class="secondary">检查状态</button>
        </div>
      </div>

      <div class="soft-panel">
        <div class="metric-label">第二步</div>
        <p>公众号回复成功后，这里会自动识别是否已绑定账号。</p>
        <div id="wechat-status" class="alert info">等待生成验证码。</div>
      </div>

      <div id="bind-panel" class="soft-panel hidden">
        <div class="metric-label">首次绑定</div>
        <p>该微信尚未绑定系统账号，请填写真实姓名和学号完成绑定。</p>
        <label for="bind-name">姓名</label>
        <input id="bind-name" placeholder="请输入姓名">
        <label for="bind-student-no">学号/工号</label>
        <input id="bind-student-no" placeholder="请输入学号或工号">
        <div class="actions">
          <button id="bind-btn">确认绑定并登录</button>
        </div>
      </div>
    </section>
  </section>
</main>

<script src="/js/cloudbase.full.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/common-header.js"></script>
<script>
let activeChallengeCode = '';
let activePollTimer = null;

function stopPolling() {
  if (activePollTimer) {
    clearInterval(activePollTimer);
    activePollTimer = null;
  }
}

function updateWechatStatus(type, text) {
  const status = document.getElementById('wechat-status');
  status.className = `alert ${type}`;
  status.textContent = text;
}

function handleLoginResult(result) {
  setUserToken(result.token);
  setUserInfo(result.user);
  if (result.role === 'admin' || result.role === 'super_admin') {
    setAdminToken(result.token);
  }
  showToast('success', '登录成功');
  setTimeout(() => {
    location.href = (result.role === 'admin' || result.role === 'super_admin') ? 'admin.html' : 'index.html';
  }, 500);
}

async function login() {
  const messageEl = document.getElementById('message');
  messageEl.innerHTML = '';

  try {
    const result = await callRestApi('/auth/login', {
      method: 'POST',
      body: {
        phone: phone.value.trim(),
        password: password.value
      }
    });
    showPageMessage(messageEl, 'success', '登录成功，正在进入系统...');
    handleLoginResult(result);
  } catch (error) {
    showPageMessage(messageEl, 'danger', error.message);
  }
}

async function createChallenge() {
  const bindPanel = document.getElementById('bind-panel');
  bindPanel.classList.add('hidden');
  stopPolling();

  try {
    const result = await callRestApi('/login/challenge');
    activeChallengeCode = result.code;
    document.getElementById('challenge-code').textContent = result.code;
    document.getElementById('challenge-expire').textContent = `${result.expire_minutes} 分钟`;
    updateWechatStatus('info', '验证码已生成，请发送到公众号，系统将自动轮询结果。');
    startPolling();
  } catch (error) {
    showToast('danger', error.message);
    updateWechatStatus('danger', error.message);
  }
}

async function checkChallengeStatus(silent = false) {
  if (!activeChallengeCode) {
    if (!silent) updateWechatStatus('warn', '请先生成验证码。');
    return;
  }

  try {
    const result = await callRestApi(`/login/status?code=${encodeURIComponent(activeChallengeCode)}`);
    if (result.token) {
      stopPolling();
      updateWechatStatus('success', '微信验证成功，正在登录...');
      handleLoginResult(result);
      return;
    }

    if (result.need_bind) {
      stopPolling();
      document.getElementById('bind-panel').classList.remove('hidden');
      updateWechatStatus('warn', `微信已识别（${result.openid_masked || '已匹配'}），请补充姓名和学号完成首次绑定。`);
      return;
    }

    if (!silent) {
      updateWechatStatus('info', '验证码仍在等待公众号确认。');
    }
  } catch (error) {
    if (!silent) updateWechatStatus('danger', error.message);
  }
}

function startPolling() {
  stopPolling();
  activePollTimer = setInterval(() => checkChallengeStatus(true), 3000);
}

async function submitBind() {
  if (!activeChallengeCode) {
    showToast('warn', '请先生成并验证验证码');
    return;
  }

  try {
    const result = await callRestApi('/login/bind', {
      method: 'POST',
      body: {
        temp_code: activeChallengeCode,
        name: document.getElementById('bind-name').value.trim(),
        student_no: document.getElementById('bind-student-no').value.trim()
      }
    });
    updateWechatStatus('success', '绑定成功，正在登录...');
    handleLoginResult(result);
  } catch (error) {
    showToast('danger', error.message);
    updateWechatStatus('danger', error.message);
  }
}

document.getElementById('login-btn').addEventListener('click', login);
document.getElementById('password').addEventListener('keydown', (event) => {
  if (event.key === 'Enter') login();
});
document.getElementById('new-challenge-btn').addEventListener('click', createChallenge);
document.getElementById('check-status-btn').addEventListener('click', () => checkChallengeStatus(false));
document.getElementById('bind-btn').addEventListener('click', submitBind);
</script>
</body>
</html>
