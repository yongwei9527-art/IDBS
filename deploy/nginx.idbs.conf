# IDBS reverse proxy template
# - Node listens on 127.0.0.1:3000
# - Terminate TLS at Nginx (recommended)
# - Application still enforces auth / rate limits; this layer adds edge protection

limit_req_zone $binary_remote_addr zone=idbs_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=idbs_login:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=idbs_conn:10m;

upstream idbs_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Redirect to HTTPS in production after certificates are ready:
    # return 301 https://$host$request_uri;

    server_tokens off;
    client_max_body_size 20m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 60s;

    # Basic abuse controls
    limit_conn idbs_conn 40;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Never expose private export files as static public assets.
    location ^~ /uploads/exports/ {
        return 404;
    }

    location /uploads/ {
        proxy_pass http://idbs_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    location = /api/v5/ws {
        proxy_pass http://idbs_node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 75s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    location = /api/v5/auth/login {
        limit_req zone=idbs_login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://idbs_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    location /api/ {
        limit_req zone=idbs_api burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://idbs_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    location / {
        proxy_pass http://idbs_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }
}

